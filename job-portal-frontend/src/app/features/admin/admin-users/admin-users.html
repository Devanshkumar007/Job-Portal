<div class="page-header">
  <h1>Manage Users</h1>
  <p>View and manage all registered users on the platform</p>
</div>

<mat-card class="table-card section-card">
  <mat-card-header>
    <mat-card-title>All Users</mat-card-title>
    <mat-card-subtitle>{{ users.length }} total users</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <div *ngIf="isLoading" class="loading">
      <mat-icon class="spin">refresh</mat-icon>
      <p>Loading users...</p>
    </div>

    <table mat-table [dataSource]="users" *ngIf="!isLoading" class="full-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let u">
          <div class="user-cell">
            <div class="avatar">{{ u.name.charAt(0) }}</div>
            {{ u.name }}
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let u">{{ u.email }}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Role</th>
        <td mat-cell *matCellDef="let u">
          <mat-chip [color]="getRoleColor(u.role)" selected>{{ u.role }}</mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef>Phone</th>
        <td mat-cell *matCellDef="let u">{{ u.phone || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let u">
          <button mat-icon-button color="warn" (click)="deleteUser(u.id)" matTooltip="Delete user">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card-content>
</mat-card>
